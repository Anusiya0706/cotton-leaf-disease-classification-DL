 <!DOCTYPE html>
<html>
<head>
    <title>Cotton Leaf Disease Detection</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
            text-align:center;
            padding:40px;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:10px;
            width:400px;
            margin:auto;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            color:green;
        }

        input{
            margin:20px;
        }

        button{
            padding:10px 20px;
            background:green;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        img{
            margin-top:20px;
            width:250px;
            border-radius:10px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>Cotton Leaf Disease Detection</h1>

    <form action="/predict" method="post" enctype="multipart/form-data">

        <input type="file" name="file" required>

        <br>

        <button type="submit">Predict</button>

    </form>

    {% if prediction %}

        <h2>Prediction : {{ prediction }}</h2>

        <img src="{{ image_path }}">

    {% endif %}

</div>

</body>
</html>
